{% extends "base.html" %}

{% block title %}Register - Smart Farmer Marketplace{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h3>Create an Account</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Register as</label>
                        <select class="form-select" id="role" name="role" required onchange="toggleFarmerFields()">
                            <option value="">Select Role</option>
                            <option value="farmer">Farmer</option>
                            <option value="buyer">Buyer</option>
                        </select>
                    </div>
                    
                    <!-- Farmer-specific fields (hidden initially) -->
                    <div id="farmer-fields" style="display: none;">
                        <div class="mb-3">
                            <label for="farm_name" class="form-label">Farm Name</label>
                            <input type="text" class="form-control" id="farm_name" name="farm_name">
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" name="location">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="contact_number" class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" id="contact_number" name="contact_number">
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div class="text-center mt-3">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function toggleFarmerFields() {
    const roleSelect = document.getElementById('role');
    const farmerFields = document.getElementById('farmer-fields');
    
    if (roleSelect.value === 'farmer') {
        farmerFields.style.display = 'block';
    } else {
        farmerFields.style.display = 'none';
    }
}
</script>
{% endblock %}
