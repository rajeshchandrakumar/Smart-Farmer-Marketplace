{% extends "base.html" %}

{% block title %}Edit Product - Smart Farmer Marketplace{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3>Edit Product: {{ product.name }}</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required>{{ product.description }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="category" name="category" value="{{ product.category }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price }}" required min="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" name="quantity" value="{{ product.quantity }}" required min="1">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="image" class="form-label">Product Image</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            <div class="form-text">Leave blank to keep current image</div>
                            
                            {% if product.image_path %}
                            <div class="mt-2">
                                <p>Current Image:</p>
                                <img src="{{ url_for('static', filename=product.image_path[7:]) }}" width="100" height="100" class="img-thumbnail" alt="{{ product.name }}">
                            </div>
                            {% endif %}
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Update Product</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-secondary me-2">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn btn-info">
                        <i class="fas fa-eye"></i> View Product
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
